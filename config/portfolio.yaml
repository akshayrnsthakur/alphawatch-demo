# ------------------------------------------------------------------------------
# Hedging Policy
# ------------------------------------------------------------------------------
hedging:
  enabled: true
  instrument: "BTC_PUT_OPTIONS"
  target_coverage_pct: 0.20
  max_premium_pct_of_portfolio: 0.02
  rebalance_trigger_pct: 0.05

# ------------------------------------------------------------------------------
# Yield Strategy
# ------------------------------------------------------------------------------
yield:
  stablecoin_targets:
    min_apy: 0.05
    max_protocol_risk: "medium"
    preferred_protocols:
      - "Aave"
      - "Morpho"
      - "Institutional Lending"
  defi_exposure_max_pct: 0.05

# ------------------------------------------------------------------------------
# Monitoring
# ------------------------------------------------------------------------------
monitoring:
  daily_digest: true
  weekly_report: true
  anomaly_alerts: true
  macro_indicators:
    - DFF
    - T10Y2Y
    - DTWEXBGS
    - CPIAUCSL
    - UNRATE
    - VIXCLS
