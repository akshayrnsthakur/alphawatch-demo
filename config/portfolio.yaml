    crypto_custody_infra:
      name: "Crypto Custody Infrastructure"
      conviction: high
      horizon: "3-5yr"
      linked_positions: [CRYPTO_INFRA_EQUITY]
      signal_keywords:
        - "institutional crypto"
        - "crypto custody"
        - "digital asset regulation"
        - "ETF approval"
        - "crypto IPO"
      bull_catalysts:
        - "Regulatory clarity for digital assets"
        - "Institutional AUM growth in crypto"
        - "IPO/acquisition of major custodian"
      bear_risks:
        - "Prolonged crypto bear market"
        - "Regulatory crackdown on custodians"

    ai_buildout:
      name: "AI Infrastructure Buildout"
      conviction: high
      horizon: "2-4yr"
      linked_positions: [SOL]
      signal_keywords:
        - "AI capex"
        - "data center"
        - "GPU shortage"
        - "AI energy demand"
        - "hyperscaler"
      bull_catalysts:
        - "Continued hyperscaler AI capex"
        - "AI agent adoption at enterprise scale"
      bear_risks:
        - "AI investment bubble correction"
        - "Regulatory constraints on AI"

    nuclear_renaissance:
      name: "Nuclear Energy Renaissance"
      conviction: medium
      horizon: "3-7yr"
      linked_positions: []
      signal_keywords:
        - "nuclear energy"
        - "SMR"
        - "uranium"
        - "data center power"
      bull_catalysts:
        - "Tech companies signing nuclear PPAs"
        - "SMR regulatory approval"

    india_growth:
