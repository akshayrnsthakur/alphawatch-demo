# ------------------------------------------------------------------------------
# Risk Thresholds
# ------------------------------------------------------------------------------
thresholds:
  max_single_asset_pct: 0.35
  max_crypto_correlated_pct: 0.70
  max_illiquid_pct: 0.50
  min_cash_buffer_usd: 40000        # 6 months expenses
  btc_drawdown_stress_pct: -0.60
  eth_drawdown_stress_pct: -0.75
  monthly_burn_usd: 6500            # Living expenses

# ------------------------------------------------------------------------------
# Wealth Goals (drives report framing)
# ------------------------------------------------------------------------------
wealth_goals:
  target_net_worth_5yr_usd: 3000000
  target_net_worth_10yr_usd: 10000000
  startup_investing_threshold_usd: 2000000   # When to start deploying as angel
  target_check_size_usd: 150000
  primary_liquidity_event: "Private equity IPO/acquisition"
  estimated_event_window: "2027-2029"

# ------------------------------------------------------------------------------
# Thematic Bets
# ------------------------------------------------------------------------------
